info:
  name: Campaign - Management - Create Contact List
  type: http
  seq: 15

http:
  method: POST
  url: "{{baseUrl}}/v3/campaign-management/campaigns/{{campaignId}}/contact-list"
  body:
    type: json
    data: |-
      {
          "supportedChannels": [ "Voice"],
          "activationTimeLagMinutes": 0
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
