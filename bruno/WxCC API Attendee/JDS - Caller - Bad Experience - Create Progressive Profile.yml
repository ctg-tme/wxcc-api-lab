info:
  name: JDS - Caller - Bad Experience - Create Progressive Profile
  type: http
  seq: 20

http:
  method: POST
  url: "{{baseUrl}}/admin/v1/api/profile-view-template/workspace-id/{{workspaceId}}"
  body:
    type: json
    data: |-
      {
          "name": "bad-experience-profile",
          "attributes": [
              {
                  "displayName": "Bad Experience Count",
                  "version": "1.0",
                  "event": "BadExperience",
                  "metaDataType": "double",
                  "metaData": "badExperienceCount",
                  "limit": 90,
                  "lookBackDurationType": "minutes",
                  "lookBackPeriod": 30,
                  "aggregationMode": "Sum",
                  "verbose": true,
                  "widgetAttributes": {
                      "type": "table"
                  }
              },
              {
